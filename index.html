<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام الحسابات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">تسجيل الدخول</h1>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="البريد الإلكتروني"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="اسم المستخدم"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="كلمة المرور"
                        required
                    >
                </div>
                
                <button type="submit" class="btn-login">تسجيل الدخول</button>
            </form>
            
            <div class="login-links">
                <a href="#" id="forgetPasswordLink" class="link">نسيت كلمة المرور؟</a>
                <a href="#" id="signupLink" class="link">إنشاء حساب</a>
            </div>
        </div>
    </div>

    <div class="signup-container hidden">
        <div class="signup-box">
            <h1 class="signup-title">إنشاء حساب جديد</h1>
            
            <form id="signupForm" class="signup-form">
                <div class="form-group">
                    <input 
                        type="email" 
                        id="signupEmail" 
                        class="form-input" 
                        placeholder="البريد الإلكتروني"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <input 
                        type="text" 
                        id="signupUsername" 
                        class="form-input" 
                        placeholder="اسم المستخدم"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <input 
                        type="password" 
                        id="signupPassword" 
                        class="form-input" 
                        placeholder="كلمة المرور"
                        required
                    >
                </div>
                
                <button type="submit" class="btn-signup">تسجيل</button>
            </form>
            
            <div class="signup-links">
                <a href="#" id="backToLoginLink" class="link">رجوع لتسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
